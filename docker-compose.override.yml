        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9056/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ─── Finance Service ────────────────────────────────────────────────────────
  finance-service:
    build:
      context: .
      dockerfile: services/finance-service/Dockerfile
    image: launch-run/finance-service:local
    ports:
      - "9060:9060"
    env_file: .env
    environment:
      PORT: "9060"
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      KAFKA_BROKERS: ${KAFKA_BROKERS}
    networks:
      - launch-run
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9060/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ─── Insurance Service ──────────────────────────────────────────────────────
  insurance-service:
    build:
      context: .
      dockerfile: services/insurance-service/Dockerfile
    image: launch-run/insurance-service:local
    ports:
      - "9061:9061"
    env_file: .env
    environment:
      PORT: "9061"
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      KAFKA_BROKERS: ${KAFKA_BROKERS}
    networks:
      - launch-run
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9061/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ─── AI Service (Python / FastAPI / LangGraph) ────────────────────────────────
  ai-service:
    build:
      context: services/ai-service
      dockerfile: Dockerfile
    image: launch-run/ai-service:local
    ports:
      - "9011:9011"
    env_file: .env
    environment:
      API_PORT: "9011"
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      KAFKA_BROKERS: ${KAFKA_BROKERS}
      USE_MOCK_INFERENCE: ${USE_MOCK_INFERENCE:-true}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    networks:
      - launch-run
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9011/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ─── vLLM inference (GPU only, opt-in via --profile gpu) ─────────────────────
  vllm:
    image: vllm/vllm-openai:latest
    ports:
      - "8000:8000"
    command: >
      --model Qwen/Qwen2.5-7B-Instruct
      --max-model-len 4096
      --gpu-memory-utilization 0.9
    networks:
      - launch-run
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles:
      - gpu
