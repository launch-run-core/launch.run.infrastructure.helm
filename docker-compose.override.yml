# docker-compose.override.yml — application services (Go + Python)
# Automatically merged with docker-compose.yml by docker compose.
# All services depend on infra being healthy before starting.
#
# Usage:
#   docker compose up -d            # starts infra + services
#   docker compose up -d gateway    # start only gateway (+ its deps)

name: launch-run

services:
  # ─── API Gateway ─────────────────────────────────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    image: launch-run/gateway:local
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      PORT: "8080"
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - launch-run
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ─── Listing Service ─────────────────────────────────────────────────────────
  listing-service:
    build:
      context: .
      dockerfile: services/listing-service/Dockerfile
