apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: launch-run-dev
  labels:
    app: gateway
    app.kubernetes.io/part-of: launch-run
spec:
  replicas: 3
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
        app.kubernetes.io/part-of: launch-run
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: gateway
          image: ghcr.io/launch-run-core/launch.run.gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: launch-run-config
            - secretRef:
                name: launch-run-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: launch-run-dev
  labels:
    app: gateway
    app.kubernetes.io/part-of: launch-run
spec:
  type: ClusterIP
  selector:
    app: gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-lb
  namespace: launch-run-dev
  labels:
    app: gateway
    app.kubernetes.io/part-of: launch-run
spec:
  type: LoadBalancer
  selector:
    app: gateway
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gateway
  namespace: launch-run-dev
  labels:
    app: gateway
    app.kubernetes.io/part-of: launch-run
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gateway
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
