apiVersion: apps/v1
kind: Deployment
metadata:
  name: geolocation-service
  namespace: launch-run-dev
  labels:
    app: geolocation-service
    app.kubernetes.io/part-of: launch-run
spec:
  replicas: 2
  selector:
    matchLabels:
      app: geolocation-service
  template:
    metadata:
      labels:
        app: geolocation-service
        app.kubernetes.io/part-of: launch-run
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: geolocation-service
          image: ghcr.io/launch-run-core/launch.run.geolocation-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 9015
              protocol: TCP
          envFrom:
            - configMapRef:
                name: launch-run-config
            - secretRef:
                name: launch-run-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 9015
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 9015
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: geolocation-service
  namespace: launch-run-dev
  labels:
    app: geolocation-service
    app.kubernetes.io/part-of: launch-run
spec:
  type: ClusterIP
  selector:
    app: geolocation-service
  ports:
    - name: http
      port: 9015
      targetPort: 9015
      protocol: TCP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: geolocation-service
  namespace: launch-run-dev
  labels:
    app: geolocation-service
    app.kubernetes.io/part-of: launch-run
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: geolocation-service
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
