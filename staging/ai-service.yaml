apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: launch-run-dev
  labels:
    app: ai-service
    app.kubernetes.io/part-of: launch-run
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
        app.kubernetes.io/part-of: launch-run
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: ai-service
          image: ghcr.io/launch-run-core/launch.run.ai-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 9011
              protocol: TCP
          envFrom:
            - configMapRef:
                name: launch-run-config
            - secretRef:
                name: launch-run-secrets
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2000m"
              memory: 4Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 9011
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 9011
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: launch-run-dev
  labels:
    app: ai-service
    app.kubernetes.io/part-of: launch-run
spec:
  type: ClusterIP
  selector:
    app: ai-service
  ports:
    - name: http
      port: 9011
      targetPort: 9011
      protocol: TCP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-service
  namespace: launch-run-dev
  labels:
    app: ai-service
    app.kubernetes.io/part-of: launch-run
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-service
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
