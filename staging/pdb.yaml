apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: gateway-pdb
  namespace: launch-run-dev
  labels:
    app.kubernetes.io/part-of: launch-run
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: gateway
